name: Implement scheduled research map indexing

on:
  push:
    branches:
      - feat/31-scheduled-research-map

permissions:
  contents: write

jobs:
  implement:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/31-scheduled-research-map
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Update the existing map generator and focused test
        run: |
          python <<'PY'
          from pathlib import Path

          cli_path = Path('packages/cli/bin/bapX.ts')
          cli = cli_path.read_text()

          helper_anchor = """function listMapChildDirs(root: string, relPath: string): string[] {
          \treturn fs
          \t\t.readdirSync(path.join(root, relPath), { withFileTypes: true })
          \t\t.filter((entry) => entry.isDirectory() && !MAP_SKIPPED_DIRECTORIES.has(entry.name))
          \t\t.map((entry) => entry.name)
          \t\t.sort((a, b) => a.localeCompare(b));
          }
          """
          helper_replacement = helper_anchor + """
          function listScheduledResearchPaths(root: string): string[] {
          \tconst researchRoot = 'docs/scheduled-research';
          \tif (!isDirectory(path.join(root, researchRoot))) return [];

          \tconst paths: string[] = [];
          \tconst visit = (relPath: string) => {
          \t\tconst entries = fs
          \t\t\t.readdirSync(path.join(root, relPath), { withFileTypes: true })
          \t\t\t.filter((entry) => !MAP_SKIPPED_DIRECTORIES.has(entry.name))
          \t\t\t.sort((a, b) => a.name.localeCompare(b.name));

          \t\tfor (const entry of entries) {
          \t\t\tconst childPath = `${relPath}/${entry.name}`;
          \t\t\tif (entry.isDirectory()) {
          \t\t\t\tpaths.push(childPath);
          \t\t\t\tvisit(childPath);
          \t\t\t} else if (entry.isFile() && entry.name.endsWith('.md')) {
          \t\t\t\tpaths.push(childPath);
          \t\t\t}
          \t\t}
          \t};

          \tvisit(researchRoot);
          \treturn paths;
          }
          """
          if helper_anchor not in cli:
              raise SystemExit('map child helper anchor not found')
          cli = cli.replace(helper_anchor, helper_replacement, 1)

          map_anchor = """\tfor (const topLevel of MAP_TOP_LEVEL_ORDER) {
          \t\tif (!isDirectory(path.join(root, topLevel))) continue;

          \t\tconst parentId = mapNodeId(topLevel);
          \t\tlines.push(`  ${parentId}[\"${mapNodeLabel(topLevel)}\"]`);
          \t\tlines.push(`  root --> ${parentId}`);

          \t\tif (!MAP_CHILD_DIRECTORIES.has(topLevel)) continue;

          \t\tfor (const child of listMapChildDirs(root, topLevel)) {
          \t\t\tconst childPath = `${topLevel}/${child}`;
          \t\t\tconst childId = mapNodeId(childPath);
          \t\t\tlines.push(`  ${childId}[\"${mapNodeLabel(childPath)}\"]`);
          \t\t\tlines.push(`  ${parentId} --> ${childId}`);
          \t\t}
          \t}

          \tlines.push('');
          """
          map_replacement = map_anchor.replace(
              "\n\tlines.push('');\n",
              """

          \tfor (const researchPath of listScheduledResearchPaths(root)) {
          \t\tconst researchId = mapNodeId(researchPath);
          \t\tconst parentPath = path.posix.dirname(researchPath);
          \t\tlines.push(`  ${researchId}[\"${mapNodeLabel(researchPath)}\"]`);
          \t\tlines.push(`  ${mapNodeId(parentPath)} --> ${researchId}`);
          \t}

          \tlines.push('');
          """,
          )
          if map_anchor not in cli:
              raise SystemExit('generateProjectMap anchor not found')
          cli = cli.replace(map_anchor, map_replacement, 1)
          cli_path.write_text(cli)

          test_path = Path('packages/cli/test/map.test.mjs')
          test = test_path.read_text()
          addition = """

          test('map includes scheduled research categories and Markdown records', (t) => {
          \tconst root = fs.mkdtempSync(path.join(os.tmpdir(), 'bapx-research-map-'));
          \tt.after(() => fs.rmSync(root, { recursive: true, force: true }));
          \tconst category = path.join(root, 'docs', 'scheduled-research', 'agent-standards');
          \tfs.mkdirSync(category, { recursive: true });
          \tfs.writeFileSync(path.join(root, 'docs', 'scheduled-research', 'index.md'), '# Scheduled Research\\n');
          \tfs.writeFileSync(path.join(category, 'repository-agent-conventions.md'), '# Conventions\\n');

          \tconst written = spawnSync(process.execPath, [cli, 'map', '--root', root], { encoding: 'utf8' });
          \tassert.equal(written.status, 0, written.stderr);
          \tconst generated = fs.readFileSync(path.join(root, 'map.mmd'), 'utf8');
          \tassert.match(generated, /docs\\/scheduled-research\\/index\\.md/);
          \tassert.match(generated, /docs\\/scheduled-research\\/agent-standards/);
          \tassert.match(generated, /docs\\/scheduled-research\\/agent-standards\\/repository-agent-conventions\\.md/);

          \tconst checked = spawnSync(process.execPath, [cli, 'map', '--root', root, '--check'], {
          \t\tencoding: 'utf8',
          \t});
          \tassert.equal(checked.status, 0, checked.stderr);
          });
          """
          if "map includes scheduled research categories" not in test:
              test_path.write_text(test.rstrip() + addition + '\n')
          PY

      - run: npm ci
      - run: npm run build --workspace @bapX/cli
      - run: node --test packages/cli/test/map.test.mjs
      - run: node packages/cli/dist/bapX.js map --root .
      - run: node packages/cli/dist/bapX.js map --root . --check

      - name: Commit the validated implementation
        run: |
          rm .github/workflows/implement-scheduled-research-map.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/cli/bin/bapX.ts packages/cli/test/map.test.mjs docs/scheduled-research map.mmd .github/workflows/implement-scheduled-research-map.yml
          git commit -m "feat(map): index scheduled research documents"
          git push origin HEAD:feat/31-scheduled-research-map
