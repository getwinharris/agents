name: Admin Project Import

on:
  pull_request:
    paths:
      - 'apps/www/**'
      - 'internal-docs/admin-surface.md'
      - '.github/workflows/admin-project-import.yml'

permissions:
  contents: read

jobs:
  validate:
    name: Server tests and Admin build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run apps-www server contracts
        run: npm run test:server --workspace apps-www

      - name: Build apps-www and Admin
        run: npm run build --workspace apps-www
